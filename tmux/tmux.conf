# -- display -------------------------------------------------------------------

set -g base-index 1           # start windows numbering at 1
setw -g pane-base-index 1     # make pane numbering consistent with windows

setw -g automatic-rename on   # rename window to reflect current program
set -g renumber-windows on    # renumber windows when a window is closed

set -g set-titles on          # set terminal title
set -g set-titles-string '#h ❐ #S ● #I #W'

# move status line to top
set -g status-position top

# activity
setw -g monitor-activity on
set -g visual-activity off

# -- user customizations -------------------------------------------------------
# this is the place to override or undo settings

# create session
bind C-c new-session

bind C-x confirm-before kill-session

bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  refresh-client -S

# clear both screen and history
bind -n C-l send-keys C-l \; run 'sleep 0.1' \; clear-history

# start with mouse mode enabled
set -g mouse on

if '[ -n "$SSH_CLIENT" ]' \
  "set -g status-position bottom"

bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# -- plugin configuration ------------------------------------------------------

set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

set -g @1password-key 'u'
set -g @1password-vault 'Personal'
set -g @1password-items-jq-filter ' \
  .[] \
  | [select(.overview.URLs | map(select(.u == "sudolikeaboss://local")) | length == 1)?] \
  | map([ .overview.title, .uuid ] \
  | join(",")) \
  | .[] \
'

# -- TPM -----------------------------------------------------------------------
# List of plugins
 set -g @tpm_plugins '                \
   tmux-plugins/tpm                   \
   tmux-plugins/tmux-sensible         \
   tmux-plugins/tmux-prefix-highlight \
   nhdaly/tmux-better-mouse-mode      \
   tmux-plugins/tmux-yank             \
   yardnsm/tmux-1password             \
 '

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Import Theme
run-shell "~/.tmux/tmux-theme.tmux"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
